name: mymusic
description: "My Music — a clean, private music player."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^14.0.0

  # State management
  flutter_riverpod: ^2.5.1

  # Audio playback (Chrome + Android)
  just_audio: ^0.9.40

  # Local persistence for settings
  shared_preferences: ^2.3.0

  # HTTP for Phase 2 YouTube Music
  dio: ^5.4.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/audio/
