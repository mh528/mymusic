name: mymusic
description: "My Music — a clean, private music player."
publish_to: 'none'

version: 1.3.2+18

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^14.0.0

  # State management
  flutter_riverpod: ^2.5.1

  # Audio playback (Chrome + Android)
  just_audio: ^0.9.40
  just_audio_background: 0.0.1-beta.12

  # Local persistence for settings
  shared_preferences: ^2.3.0

  # HTTP for Phase 2 YouTube Music
  dio: ^5.4.3

  # Phase 1E — Local folder library
  file_picker: ^11.0.2       # Native folder picker dialog
  permission_handler: ^11.0.0 # Android READ_MEDIA_AUDIO permission
  path_provider: ^2.1.0      # getApplicationSupportDirectory() for JSON cache
  crypto: ^3.0.3             # MD5 hash for stable song IDs
  mp3_info: ^0.2.3

  # Phase 2 — YouTube Music streaming
  youtube_explode_dart: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/audio/
    - assets/icon.png
